
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PotsdamNavi</title>

  <!-- Leaflet карта -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>
  <h1 id="title">PotsdamNavi</h1>

  <input id="search" placeholder="Search..." />
  <button onclick="flyToPotsdam()">🏛 Potsdam</button>
</header>

<div id="map"></div>

<div class="panel">
  <button onclick="setCategory('all')">🌍 All</button>
  <button onclick="setCategory('castle')">🏛 Castles</button>
  <button onclick="setCategory('cafe')">☕ Cafes</button>
  <button onclick="setCategory('restaurant')">🍽 Food</button>
  <button onclick="setCategory('park')">🌳 Parks</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="lang.js"></script>
<script src="map.js"></script>
<script src="app.js"></script>

<script>
  document.getElementById("title").innerText =
    LANG[CURRENT_LANG].title;
</script>

</body>
</html>
